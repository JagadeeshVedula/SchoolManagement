name: school_management
description: A modern school management system with role-based login

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^4.0.4
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.1.1
  provider: ^6.0.5
  supabase_flutter: ^1.10.0
  excel: ^2.0.0
  intl: ^0.19.0
  path_provider: ^2.1.0
  pdf: ^3.10.0
  permission_handler: ^11.4.0
  file_picker: ^5.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/Receipt_log.png"
  min_sdk_android: 21

