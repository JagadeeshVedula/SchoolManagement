plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.nalanda.staffapp"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.nalanda.staffapp"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
    
        lintOptions {
        checkReleaseBuilds = false
        abortOnError = false
    }

    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "Nalanda Staff App.apk"
        }
    }
}

configurations {
    // Exclude iOS-specific dependencies
    configureEach {
        exclude group: 'com.google.xr', module: 'google-cardboard'
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Empty - all dependencies come from Flutter
}


// Workaround for flutter_web_plugins on Android
configurations.all {
    exclude module: 'flutter_web_plugins'
}

